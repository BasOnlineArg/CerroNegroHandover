<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cerro Negro - Gestión de Turnos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-fade { animation: fadeIn 0.4s ease-out; }
    </style>
</head>
<body class="bg-[#0F172A] text-slate-800">
    <div id="root"></div>

    <script type="module">
        import { h, render } from 'https://unpkg.com/preact?module';
        import { useState, useEffect, useMemo } from 'https://unpkg.com/preact/hooks?module';
        import htm from 'https://unpkg.com/htm?module';
        const html = htm.bind(h);

        // Firebase SDKs
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, getDoc, getDocs, setDoc, addDoc, onSnapshot, query, orderBy, serverTimestamp, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            projectId: "gen-lang-client-0731441501",
            appId: "1:548575147749:web:bf985d98e9ed9255eb460c",
            apiKey: "AIzaSyAQ6T86zJOAsj_VFvJx1oec0W8rpGjnAg8",
            authDomain: "gen-lang-client-0731441501.firebaseapp.com",
            firestoreDatabaseId: "ai-studio-ec28bf28-f54c-4bf8-88a1-0422d97ca4d9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app, firebaseConfig.firestoreDatabaseId);

        // Enums
        const FleetType = {
            STRUCTURAL: "Estructural",
            ELECTRICAL: "Electrico",
            DRILLS: "Perforadoras",
            AUXILIARY: "Multiflota",
            SHOVELS_TRUCKS: "Palas y Camiones",
            GOMERIA: "Gomeria",
            RELIABILITY_KPIS: "KPIs Confiabilidad"
        };

        const UserRole = {
            ADMIN: "admin",
            SUPERVISOR: "supervisor",
            ESTRUCTURAL: "estructural",
            INSPECTOR_ESTRUCTURAL: "inspector estructural",
            ELECTRICO: "electrico",
            PERFO: "perfo",
            PYC: "pyc",
            MULTIFLOTA: "multiflota",
            GOMERIA: "gomeria"
        };

        const FRM_RISKS = [
            { id: 'frm-1', name: 'Espacios Confinados', icon: 'fa-door-closed' },
            { id: 'frm-2', name: 'Contacto Electricidad', icon: 'fa-bolt-lightning' },
            { id: 'frm-3', name: 'Atrapamiento Equipos', icon: 'fa-gears' },
            { id: 'frm-4', name: 'Caída en Altura', icon: 'fa-arrows-up-to-line' },
            { id: 'frm-5', name: 'Inestabilidad Terreno', icon: 'fa-mountain-sun' },
            { id: 'frm-6', name: 'Colisión Vehículos', icon: 'fa-car-burst' },
            { id: 'frm-7', name: 'Vuelco de Vehículos', icon: 'fa-truck-field-unpaved' },
            { id: 'frm-8', name: 'Grúas e Izaje', icon: 'fa-crane' },
            { id: 'frm-9', name: 'Caída de Objetos', icon: 'fa-box-open' },
            { id: 'frm-10', name: 'Vehículo al Vacío', icon: 'fa-arrow-trend-down' },
            { id: 'frm-11', name: 'Incendio/Explosión', icon: 'fa-fire-flame-curved' },
            { id: 'frm-12', name: 'Materiales Peligrosos', icon: 'fa-biohazard' },
            { id: 'frm-13', name: 'Explosivos', icon: 'fa-bomb' },
            { id: 'frm-14', name: 'Aviación', icon: 'fa-plane-departure' },
            { id: 'frm-15', name: 'Gases y Polvos', icon: 'fa-mask-face' },
            { id: 'frm-16', name: 'Caída al Agua', icon: 'fa-person-swimming' },
            { id: 'frm-17', name: 'Excavaciones', icon: 'fa-shovels' },
            { id: 'frm-18', name: 'Obras Temporales', icon: 'fa-trowel-bricks' }
        ];

        // Components
        const KPISection = ({ entries, title }) => {
            const stats = useMemo(() => {
                let otsGenerated = 0;
                let otsOpen = 0;
                let otsClosed = 0;
                let avisosGenerated = 0;
                let bklsGenerated = 0;

                entries.forEach(entry => {
                    const ots = entry.ots || [];
                    const notifications = entry.notifications || [];
                    otsGenerated += ots.length;
                    otsOpen += ots.filter(ot => !ot.isClosed).length;
                    otsClosed += ots.filter(ot => ot.isClosed).length;
                    avisosGenerated += notifications.length;
                    bklsGenerated += notifications.filter(n => 
                        (n.avisoNumber || '').toUpperCase().startsWith('BKL') || 
                        (n.description || '').toUpperCase().startsWith('BKL')
                    ).length;
                });

                return { otsGenerated, otsOpen, otsClosed, avisosGenerated, bklsGenerated, pases: entries.length };
            }, [entries]);

            const StatCard = ({ label, value, color, icon }) => html`
                <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                    <div class="flex justify-between items-start mb-2">
                        <div class="p-2 rounded-lg ${color} bg-opacity-10">
                            <i class="fa-solid ${icon} ${color.replace('bg-', 'text-')}"></i>
                        </div>
                        <span class="text-2xl font-black text-slate-800">${value}</span>
                    </div>
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">${label}</p>
                </div>
            `;

            return html`
                <div class="mt-8 grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4">
                    <${StatCard} label="Pases" value=${stats.pases} color="bg-slate-600" icon="fa-clipboard-list" />
                    <${StatCard} label="OTs Gen." value=${stats.otsGenerated} color="bg-blue-600" icon="fa-file-invoice" />
                    <${StatCard} label="OTs Abiertas" value=${stats.otsOpen} color="bg-amber-500" icon="fa-folder-open" />
                    <${StatCard} label="OTs Cerradas" value=${stats.otsClosed} color="bg-emerald-600" icon="fa-file-circle-check" />
                    <${StatCard} label="Avisos" value=${stats.avisosGenerated} color="bg-indigo-600" icon="fa-bell" />
                    <${StatCard} label="BKLs" value=${stats.bklsGenerated} color="bg-rose-600" icon="fa-layer-group" />
                </div>
            `;
        };

        const HandoverForm = ({ fleet, onSubmit, currentUser }) => {
            const [ots, setOts] = useState([]);
            const [notifications, setNotifications] = useState([]);
            const [notes, setNotes] = useState('');
            const [author, setAuthor] = useState(currentUser?.displayName || currentUser?.email?.split('@')[0] || '');
            const [selectedRisks, setSelectedRisks] = useState([]);
            const [shiftDate, setShiftDate] = useState(new Date().toISOString().split('T')[0]);

            const addOT = () => setOts([...ots, { id: crypto.randomUUID(), otNumber: '', description: '', isClosed: false }]);
            const addAviso = () => setNotifications([...notifications, { id: crypto.randomUUID(), avisoNumber: '', description: '' }]);
            const toggleRisk = (id) => setSelectedRisks(prev => prev.includes(id) ? prev.filter(r => r !== id) : [...prev, id]);

            const handleSubmit = () => {
                if (!author) return alert("Ingrese el responsable");
                onSubmit({ fleet, ots, notifications, generalNotes: notes, shiftDate, author, frmRisks: selectedRisks });
                setOts([]); setNotifications([]); setNotes(''); setSelectedRisks([]);
            };

            return html`
                <div class="space-y-6 animate-fade">
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-black text-slate-400 uppercase mb-1">Responsable</label>
                            <input class="w-full px-4 py-2 bg-slate-50 border rounded-xl text-sm font-bold" value=${author} onInput=${e => setAuthor(e.target.value)} />
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-slate-400 uppercase mb-1">Fecha</label>
                            <input type="date" class="w-full px-4 py-2 bg-slate-50 border rounded-xl text-sm font-bold" value=${shiftDate} onInput=${e => setShiftDate(e.target.value)} />
                        </div>
                    </div>

                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                        <div class="p-4 border-b flex justify-between items-center bg-slate-50">
                            <h3 class="text-xs font-black text-slate-500 uppercase tracking-widest">Ordenes de Trabajo</h3>
                            <button onClick=${addOT} class="bg-slate-900 text-white px-3 py-1.5 rounded-lg text-[10px] font-black uppercase">+ OT</button>
                        </div>
                        <div class="p-4 space-y-3">
                            ${ots.map(ot => html`
                                <div key=${ot.id} class="flex gap-2 items-center">
                                    <input class="w-24 bg-slate-50 border rounded p-2 text-xs font-bold" placeholder="OT#" value=${ot.otNumber} onInput=${e => { ot.otNumber = e.target.value; setOts([...ots]); }} />
                                    <input class="flex-1 bg-slate-50 border rounded p-2 text-xs" placeholder="Descripción" value=${ot.description} onInput=${e => { ot.description = e.target.value; setOts([...ots]); }} />
                                    <input type="checkbox" checked=${ot.isClosed} onChange=${e => { ot.isClosed = e.target.checked; setOts([...ots]); }} />
                                </div>
                            `)}
                        </div>
                    </div>

                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                        <h3 class="text-xs font-black text-slate-500 uppercase tracking-widest mb-4">Riesgos Críticos (FRM)</h3>
                        <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-2">
                            ${FRM_RISKS.map(risk => html`
                                <button onClick=${() => toggleRisk(risk.id)} class="p-2 rounded-lg border text-[9px] font-bold uppercase transition-all ${selectedRisks.includes(risk.id) ? 'bg-orange-600 border-orange-600 text-white' : 'bg-slate-50 border-slate-200 text-slate-500'}">
                                    ${risk.name}
                                </button>
                            `)}
                        </div>
                    </div>

                    <textarea class="w-full h-24 p-4 bg-white border border-slate-200 rounded-2xl text-sm shadow-sm" placeholder="Observaciones generales..." value=${notes} onInput=${e => setNotes(e.target.value)}></textarea>

                    <div class="flex justify-end">
                        <button onClick=${handleSubmit} class="bg-blue-600 text-white px-10 py-3 rounded-xl font-black uppercase text-xs shadow-lg hover:bg-blue-700 transition">Enviar Pase de Turno</button>
                    </div>
                </div>
            `;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [userProfile, setUserProfile] = useState(null);
            const [loading, setLoading] = useState(true);
            const [history, setHistory] = useState([]);
            const [activeFleet, setActiveFleet] = useState(FleetType.STRUCTURAL);
            const [loginEmail, setLoginEmail] = useState('');
            const [loginPass, setLoginPass] = useState('');
            const [error, setError] = useState(null);
            const [status, setStatus] = useState('Iniciando...');

            useEffect(() => {
                const unsub = onAuthStateChanged(auth, async (currentUser) => {
                    if (currentUser) {
                        try {
                            const q = query(collection(db, 'whitelist'), where('email', '==', currentUser.email.toLowerCase()));
                            const snap = await getDocs(q);
                            if (snap.empty) {
                                await signOut(auth);
                                setUser(null);
                            } else {
                                setUser(currentUser);
                                const userDoc = await getDoc(doc(db, 'users', currentUser.uid));
                                if (userDoc.exists()) setUserProfile(userDoc.data());
                            }
                        } catch (e) {
                            console.error(e);
                            setUser(null);
                        }
                    } else {
                        setUser(null);
                        setUserProfile(null);
                    }
                    setLoading(false);
                });
                return () => unsub();
            }, []);

            useEffect(() => {
                if (!user) return;
                const q = query(collection(db, 'handovers'), orderBy('timestamp', 'desc'));
                return onSnapshot(q, (snap) => {
                    setHistory(snap.docs.map(d => ({ ...d.data(), id: d.id })));
                });
            }, [user]);

            const handleLogin = async (e) => {
                e.preventDefault();
                setError(null);
                setStatus('Validando Whitelist...');
                try {
                    const q = query(collection(db, 'whitelist'), where('email', '==', loginEmail.toLowerCase()));
                    const snap = await getDocs(q);

                    if (snap.empty) {
                        const msg = "Acceso Denegado: Su correo no está autorizado para Cerro Negro. Contacte al administrador";
                        setError(msg);
                        await addDoc(collection(db, 'logs'), { timestamp: serverTimestamp(), email: loginEmail, action: 'LOGIN_DENIED', reason: 'NOT_IN_WHITELIST' });
                        return;
                    }

                    setStatus('Autenticando...');
                    await signInWithEmailAndPassword(auth, loginEmail, loginPass).catch(async (err) => {
                        if (err.code === 'auth/user-not-found' || err.code === 'auth/invalid-credential') {
                            await createUserWithEmailAndPassword(auth, loginEmail, loginPass);
                        } else throw err;
                    });

                    await addDoc(collection(db, 'logs'), { timestamp: serverTimestamp(), email: loginEmail, action: 'LOGIN_SUCCESS' });
                    setStatus('Conectado.');
                } catch (err) {
                    setError(`Error: ${err.message}`);
                    setStatus('Fallo en el ingreso.');
                }
            };

            const handleHandoverSubmit = async (entry) => {
                const id = crypto.randomUUID();
                await setDoc(doc(db, 'handovers', id), { ...entry, id, uid: user.uid, timestamp: new Date().toISOString() });
                await addDoc(collection(db, 'logs'), { timestamp: serverTimestamp(), userId: user.uid, email: user.email, action: 'CREATE_HANDOVER', fleet: entry.fleet });
                alert("Pase enviado correctamente");
            };

            if (loading) return html`<div class="h-screen flex items-center justify-center font-black uppercase tracking-widest animate-pulse text-white">Cargando Cerro Negro...</div>`;

            if (!user) {
                return html`
                    <div class="h-screen flex items-center justify-center p-6 animate-fade">
                        <div class="max-w-md w-full bg-white text-slate-800 rounded-3xl shadow-2xl overflow-hidden">
                            <div class="p-10 text-center bg-slate-50 border-b">
                                <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg">
                                    <i class="fa-solid fa-mountain-sun text-white text-2xl"></i>
                                </div>
                                <h1 class="text-2xl font-black tracking-tight">CERRO NEGRO</h1>
                                <p class="text-[10px] text-blue-600 font-bold uppercase tracking-widest">Gestión de Turnos</p>
                            </div>
                            <form onSubmit=${handleLogin} class="p-10 space-y-6">
                                <div>
                                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-2">Correo Corporativo</label>
                                    <input type="email" required class="w-full bg-slate-50 border-2 border-slate-100 rounded-xl px-4 py-3 text-sm outline-none focus:border-blue-500 transition" 
                                        value=${loginEmail} onInput=${e => setLoginEmail(e.target.value)} placeholder="usuario@newmont.com" />
                                </div>
                                <div>
                                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-2">Contraseña</label>
                                    <input type="password" required class="w-full bg-slate-50 border-2 border-slate-100 rounded-xl px-4 py-3 text-sm outline-none focus:border-blue-500 transition" 
                                        value=${loginPass} onInput=${e => setLoginPass(e.target.value)} placeholder="••••••••" />
                                </div>
                                ${error && html`<div class="bg-red-50 text-red-600 p-4 rounded-xl text-xs font-bold border border-red-100">${error}</div>`}
                                <button class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black uppercase text-xs shadow-lg hover:bg-blue-700 transition">Ingresar al Sistema</button>
                            </form>
                            <div class="px-10 pb-6 text-center"><p class="text-[9px] font-mono text-slate-400 uppercase">Status: ${status}</p></div>
                        </div>
                    </div>
                `;
            }

            const filteredHistory = history.filter(h => h.fleet === activeFleet);

            return html`
                <div class="flex h-screen bg-slate-900 overflow-hidden animate-fade">
                    <aside class="w-20 bg-slate-900 border-r border-slate-800 flex flex-col items-center py-8 gap-6 shrink-0">
                        <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg mb-4"><i class="fa-solid fa-mountain-sun text-white text-lg"></i></div>
                        ${Object.values(FleetType).map(fleet => html`
                            <button onClick=${() => setActiveFleet(fleet)} class="w-12 h-12 rounded-xl flex items-center justify-center transition-all ${activeFleet === fleet ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-500 hover:bg-slate-800'}" title=${fleet}>
                                <i class="fa-solid ${fleet === FleetType.STRUCTURAL ? 'fa-bridge' : fleet === FleetType.ELECTRICAL ? 'fa-bolt' : fleet === FleetType.DRILLS ? 'fa-bore-hole' : fleet === FleetType.AUXILIARY ? 'fa-truck-pickup' : fleet === FleetType.SHOVELS_TRUCKS ? 'fa-truck-monster' : fleet === FleetType.GOMERIA ? 'fa-circle-dot' : 'fa-chart-line'} text-sm"></i>
                            </button>
                        `)}
                        <button onClick=${() => signOut(auth)} class="mt-auto w-12 h-12 rounded-xl flex items-center justify-center text-slate-500 hover:text-red-400 transition"><i class="fa-solid fa-right-from-bracket text-sm"></i></button>
                    </aside>

                    <main class="flex-1 flex flex-col h-full overflow-hidden bg-slate-50">
                        <header class="bg-white border-b px-10 py-6 flex justify-between items-center shrink-0 shadow-sm">
                            <div><h2 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Sector Operativo</h2><p class="text-2xl font-black text-slate-800">${activeFleet}</p></div>
                            <div class="text-right"><p class="text-[10px] font-black text-slate-800 uppercase">${user.email}</p><p class="text-[8px] font-bold text-slate-400 uppercase">Sesión Activa</p></div>
                        </header>

                        <div class="flex-1 overflow-y-auto p-10 custom-scrollbar">
                            <div class="max-w-5xl mx-auto">
                                <${HandoverForm} fleet=${activeFleet} currentUser=${user} onSubmit=${handleHandoverSubmit} />
                                <${KPISection} entries=${filteredHistory} title="Métricas del Sector" />
                            </div>
                        </div>
                    </main>

                    <aside class="w-80 bg-white border-l border-slate-200 flex flex-col h-full shrink-0 shadow-sm overflow-hidden">
                        <div class="p-6 border-b bg-white"><h3 class="font-black text-slate-800 text-[10px] uppercase tracking-widest">Historial Técnico</h3></div>
                        <div class="flex-1 overflow-y-auto p-6 space-y-4 bg-slate-50/50 custom-scrollbar">
                            ${filteredHistory.map(item => html`
                                <div class="bg-white border border-slate-200 rounded-xl p-4 shadow-sm">
                                    <div class="flex justify-between items-center mb-2"><span class="text-[9px] font-bold text-slate-400 uppercase">${item.shiftDate}</span></div>
                                    <p class="text-xs font-black text-slate-800 uppercase truncate">${item.author}</p>
                                    <div class="mt-3 flex gap-3">
                                        <span class="text-[9px] font-bold text-slate-500 uppercase"><i class="fa-solid fa-wrench text-blue-500 mr-1"></i> ${item.ots?.length || 0} OTs</span>
                                        <span class="text-[9px] font-bold text-slate-500 uppercase"><i class="fa-solid fa-bell text-amber-500 mr-1"></i> ${item.notifications?.length || 0} Avisos</span>
                                    </div>
                                </div>
                            `)}
                        </div>
                    </aside>
                </div>
            `;
        };

        render(html`<${App} />`, document.getElementById('root'));
    </script>
</body>
</html>
