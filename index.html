<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cerro Negro - Gestión de Pases de Turno</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .animate-shake { animation: shake 0.2s ease-in-out 0s 2; }
    </style>
</head>
<body class="bg-[#0F172A] text-slate-800">
    <div id="root"></div>

    <script type="module">
        import { h, render } from 'https://unpkg.com/preact?module';
        import { useState, useEffect, useMemo, useRef } from 'https://unpkg.com/preact/hooks?module';
        import htm from 'https://unpkg.com/htm?module';
        const html = htm.bind(h);

        // Firebase SDKs
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, getDoc, getDocs, setDoc, addDoc, updateDoc, deleteDoc, onSnapshot, query, orderBy, serverTimestamp, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebase Config
        const firebaseConfig = {
            projectId: "gen-lang-client-0731441501",
            appId: "1:548575147749:web:bf985d98e9ed9255eb460c",
            apiKey: "AIzaSyAQ6T86zJOAsj_VFvJx1oec0W8rpGjnAg8",
            authDomain: "gen-lang-client-0731441501.firebaseapp.com",
            firestoreDatabaseId: "ai-studio-ec28bf28-f54c-4bf8-88a1-0422d97ca4d9",
            storageBucket: "gen-lang-client-0731441501.firebasestorage.app",
            messagingSenderId: "548575147749"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app, firebaseConfig.firestoreDatabaseId);

        // Enums & Constants
        const FleetType = {
            STRUCTURAL: "Estructural",
            ELECTRICAL: "Electrico",
            DRILLS: "Perforadoras",
            AUXILIARY: "Multiflota",
            SHOVELS_TRUCKS: "Palas y Camiones",
            GOMERIA: "Gomeria",
            RELIABILITY_KPIS: "KPIs Confiabilidad"
        };

        const UserRole = {
            ADMIN: "admin",
            SUPERVISOR: "supervisor",
            ESTRUCTURAL: "estructural",
            INSPECTOR_ESTRUCTURAL: "inspector estructural",
            ELECTRICO: "electrico",
            PERFO: "perfo",
            PYC: "pyc",
            MULTIFLOTA: "multiflota",
            GOMERIA: "gomeria"
        };

        const FRM_RISKS = [
            { id: 'frm-1', name: 'Espacios Confinados', icon: 'fa-door-closed' },
            { id: 'frm-2', name: 'Contacto Electricidad', icon: 'fa-bolt-lightning' },
            { id: 'frm-3', name: 'Atrapamiento Equipos', icon: 'fa-gears' },
            { id: 'frm-4', name: 'Caída en Altura', icon: 'fa-arrows-up-to-line' },
            { id: 'frm-5', name: 'Inestabilidad Terreno', icon: 'fa-mountain-sun' },
            { id: 'frm-6', name: 'Colisión Vehículos', icon: 'fa-car-burst' },
            { id: 'frm-7', name: 'Vuelco de Vehículos', icon: 'fa-truck-field-unpaved' },
            { id: 'frm-8', name: 'Grúas e Izaje', icon: 'fa-crane' },
            { id: 'frm-9', name: 'Caída de Objetos', icon: 'fa-box-open' },
            { id: 'frm-10', name: 'Vehículo al Vacío', icon: 'fa-arrow-trend-down' },
            { id: 'frm-11', name: 'Incendio/Explosión', icon: 'fa-fire-flame-curved' },
            { id: 'frm-12', name: 'Materiales Peligrosos', icon: 'fa-biohazard' },
            { id: 'frm-13', name: 'Explosivos', icon: 'fa-bomb' },
            { id: 'frm-14', name: 'Aviación', icon: 'fa-plane-departure' },
            { id: 'frm-15', name: 'Gases y Polvos', icon: 'fa-mask-face' },
            { id: 'frm-16', name: 'Caída al Agua', icon: 'fa-person-swimming' },
            { id: 'frm-17', name: 'Excavaciones', icon: 'fa-shovels' },
            { id: 'frm-18', name: 'Obras Temporales', icon: 'fa-trowel-bricks' }
        ];

        // Whitelist is now managed in Firestore collection 'whitelist'

        // Components
        const KPISection = ({ entries, title, isGlobal = false }) => {
            const calculateStats = (data) => {
                let otsGenerated = 0;
                let otsOpen = 0;
                let otsClosed = 0;
                let avisosGenerated = 0;
                let bklsGenerated = 0;

                data.forEach(entry => {
                    const ots = entry.ots || [];
                    const notifications = entry.notifications || [];
                    otsGenerated += ots.length;
                    otsOpen += ots.filter(ot => !ot.isClosed).length;
                    otsClosed += ots.filter(ot => ot.isClosed).length;
                    avisosGenerated += notifications.length;
                    bklsGenerated += notifications.filter(n => 
                        (n.avisoNumber || '').toUpperCase().startsWith('BKL') || 
                        (n.description || '').toUpperCase().startsWith('BKL')
                    ).length;
                });

                return { 
                    otsGenerated, 
                    otsOpen, 
                    otsClosed,
                    avisosGenerated, 
                    bklsGenerated,
                    pasesGenerados: data.length 
                };
            };

            const stats = calculateStats(entries);
            const maxVal = Math.max(stats.otsGenerated, stats.avisosGenerated, 10);

            const StatCard = ({ label, value, color, icon, tooltip }) => html`
                <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm relative group cursor-help">
                    <div class="flex justify-between items-start mb-2">
                        <div class="p-2 rounded-lg ${color} bg-opacity-10">
                            <i class="fa-solid ${icon} ${color.replace('bg-', 'text-')}"></i>
                        </div>
                        <span class="text-2xl font-black text-slate-800">${value}</span>
                    </div>
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">${label}</p>
                    <div class="mt-3 w-full bg-slate-100 h-1.5 rounded-full overflow-hidden">
                        <div class="h-full ${color} transition-all duration-1000" style="width: ${Math.min((value / maxVal) * 100, 100)}%"></div>
                    </div>
                </div>
            `;

            return html`
                <div class="mt-8">
                    <div class="flex items-center gap-3 mb-4">
                        <div class="h-px flex-1 bg-slate-200"></div>
                        <h3 class="text-xs font-black text-slate-400 uppercase tracking-[0.2em]">${title}</h3>
                        <div class="h-px flex-1 bg-slate-200"></div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-6 gap-4">
                        <${StatCard} label="Pases" value=${stats.pasesGenerados} color="bg-slate-600" icon="fa-clipboard-list" />
                        <${StatCard} label="OTs Gen." value=${stats.otsGenerated} color="bg-blue-600" icon="fa-file-invoice" />
                        <${StatCard} label="OTs Abiertas" value=${stats.otsOpen} color="bg-amber-500" icon="fa-folder-open" />
                        <${StatCard} label="OTs Cerradas" value=${stats.otsClosed} color="bg-emerald-600" icon="fa-file-circle-check" />
                        <${StatCard} label="Avisos" value=${stats.avisosGenerated} color="bg-indigo-600" icon="fa-bell" />
                        <${StatCard} label="BKLs" value=${stats.bklsGenerated} color="bg-rose-600" icon="fa-layer-group" />
                    </div>
                </div>
            `;
        };

        const HandoverForm = ({ fleet, onSubmit, currentUser }) => {
            const [ots, setOts] = useState([]);
            const [notifications, setNotifications] = useState([]);
            const [notes, setNotes] = useState('');
            const [author, setAuthor] = useState(currentUser?.displayName || currentUser?.email?.split('@')[0] || '');
            const [selectedRisks, setSelectedRisks] = useState([]);
            const [shiftDate, setShiftDate] = useState(new Date().toISOString().split('T')[0]);
            const [error, setError] = useState(null);

            const addOT = () => setOts([...ots, { id: crypto.randomUUID(), otNumber: '', description: '', bkls: '', isClosed: false }]);
            const addAviso = () => setNotifications([...notifications, { id: crypto.randomUUID(), avisoNumber: '', description: '' }]);
            
            const updateOT = (id, field, value) => setOts(ots.map(o => o.id === id ? { ...o, [field]: value } : o));
            const updateAviso = (id, field, value) => setNotifications(notifications.map(n => n.id === id ? { ...n, [field]: value } : n));
            const toggleRisk = (id) => setSelectedRisks(prev => prev.includes(id) ? prev.filter(r => r !== id) : [...prev, id]);

            const handleHandover = () => {
                if (!author || !shiftDate) {
                    setError("Complete Creador y Fecha.");
                    setTimeout(() => setError(null), 3000);
                    return;
                }
                onSubmit({ fleet, ots, notifications, generalNotes: notes, shiftDate, author, frmRisks: selectedRisks });
                setOts([]); setNotifications([]); setNotes(''); setSelectedRisks([]);
            };

            return html`
                <div class="space-y-8">
                    ${error && html`<div class="fixed top-10 right-10 bg-red-600 text-white px-6 py-4 rounded-xl shadow-2xl z-50">${error}</div>`}
                    
                    <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
                        <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-6">Identificación</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <input class="w-full px-4 py-3 bg-slate-50 border rounded-xl text-sm font-bold" placeholder="Responsable" value=${author} onInput=${e => setAuthor(e.target.value)} />
                            <input type="date" class="w-full px-4 py-3 bg-slate-50 border rounded-xl text-sm font-bold" value=${shiftDate} onInput=${e => setShiftDate(e.target.value)} />
                        </div>
                    </div>

                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                        <div class="p-6 border-b flex justify-between items-center bg-slate-50/50">
                            <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest">Ordenes de Trabajo</h3>
                            <button onClick=${addOT} class="bg-slate-900 text-white px-4 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest">+ Agregar OT</button>
                        </div>
                        <div class="p-4 space-y-2">
                            ${ots.map(ot => html`
                                <div key=${ot.id} class="flex gap-2 items-center">
                                    <input class="w-24 bg-slate-50 border rounded p-2 text-xs font-bold" placeholder="OT#" value=${ot.otNumber} onInput=${e => updateOT(ot.id, 'otNumber', e.target.value)} />
                                    <input class="flex-1 bg-slate-50 border rounded p-2 text-xs" placeholder="Descripción" value=${ot.description} onInput=${e => updateOT(ot.id, 'description', e.target.value)} />
                                    <input type="checkbox" checked=${ot.isClosed} onChange=${e => updateOT(ot.id, 'isClosed', e.target.checked)} />
                                </div>
                            `)}
                        </div>
                    </div>

                    <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
                        <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">Riesgos Críticos (FRM)</h3>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
                            ${FRM_RISKS.map(risk => html`
                                <button 
                                    onClick=${() => toggleRisk(risk.id)}
                                    class="p-2 rounded-lg border text-[9px] font-bold uppercase transition-all ${selectedRisks.includes(risk.id) ? 'bg-orange-600 border-orange-600 text-white' : 'bg-slate-50 border-slate-200 text-slate-500'}"
                                >
                                    ${risk.name}
                                </button>
                            `)}
                        </div>
                    </div>

                    <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
                        <textarea class="w-full h-24 p-4 bg-slate-50 border rounded-xl text-sm" placeholder="Observaciones..." value=${notes} onInput=${e => setNotes(e.target.value)}></textarea>
                    </div>

                    <div class="flex justify-end">
                        <button onClick=${handleHandover} class="bg-blue-600 text-white px-10 py-4 rounded-xl font-black uppercase text-sm shadow-xl">Enviar Pase</button>
                    </div>
                </div>
            `;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [userProfile, setUserProfile] = useState(null);
            const [loading, setLoading] = useState(true);
            const [history, setHistory] = useState([]);
            const [activeFleet, setActiveFleet] = useState(FleetType.STRUCTURAL);
            const [selectedEntry, setSelectedEntry] = useState(null);
            const [loginEmail, setLoginEmail] = useState('');
            const [loginPass, setLoginPass] = useState('');
            const [loginError, setLoginError] = useState(null);
            const [isLoggingIn, setIsLoggingIn] = useState(false);
            const [systemStatus, setSystemStatus] = useState('Iniciando sistema...');
            const [forceShowForm, setForceShowForm] = useState(false);

            // Mock Data for testing
            const MOCK_ENTRIES = [
                { id: 'mock-1', author: 'SISTEMA (DEMO)', fleet: FleetType.STRUCTURAL, shiftDate: '2026-03-17', timestamp: new Date().toISOString(), generalNotes: 'Inspección de rutina en puente grúa sector A. Sin novedades críticas.', ots: [{id: 'ot-1', otNumber: '10234', description: 'Lubricación rodamientos', isClosed: true}], notifications: [] },
                { id: 'mock-2', author: 'SISTEMA (DEMO)', fleet: FleetType.ELECTRICAL, shiftDate: '2026-03-16', timestamp: new Date().toISOString(), generalNotes: 'Cambio de luminarias en taller principal.', ots: [{id: 'ot-2', otNumber: '10235', description: 'Reemplazo LED', isClosed: true}], notifications: [{id: 'av-1', avisoNumber: 'AV-001', description: 'Cableado expuesto en tablero 3'}] },
                { id: 'mock-3', author: 'SISTEMA (DEMO)', fleet: FleetType.DRILLS, shiftDate: '2026-03-15', timestamp: new Date().toISOString(), generalNotes: 'Falla en sistema hidráulico de perforadora 05.', ots: [{id: 'ot-3', otNumber: '10236', description: 'Revisión fugas', isClosed: false}], notifications: [{id: 'av-2', avisoNumber: 'BKL-002', description: 'BKL: Manguera de alta presión con desgaste'}] }
            ];

            useEffect(() => {
                setSystemStatus('Verificando sesión...');
                const unsubscribe = onAuthStateChanged(auth, async (currentUser) => {
                    try {
                        if (currentUser) {
                            // Validación de Whitelist en persistencia
                            const whitelistQuery = query(collection(db, 'whitelist'), where('email', '==', currentUser.email.toLowerCase()));
                            const whitelistSnap = await getDocs(whitelistQuery);
                            
                            if (whitelistSnap.empty) {
                                setSystemStatus('Acceso revocado o no autorizado.');
                                await signOut(auth);
                                setUser(null);
                                setUserProfile(null);
                                return;
                            }

                            setUser(currentUser);
                            setSystemStatus(`Usuario: ${currentUser.email}. Cargando perfil...`);
                            const userDoc = await getDoc(doc(db, 'users', currentUser.uid));
                            if (userDoc.exists()) {
                                setUserProfile(userDoc.data());
                                setSystemStatus('Perfil cargado.');
                            } else {
                                setSystemStatus('Creando perfil...');
                                const profile = {
                                    uid: currentUser.uid,
                                    email: currentUser.email,
                                    displayName: currentUser.displayName || currentUser.email.split('@')[0],
                                    role: UserRole.GOMERIA,
                                    createdAt: new Date().toISOString()
                                };
                                await setDoc(doc(db, 'users', currentUser.uid), profile);
                                setUserProfile(profile);
                            }
                            setForceShowForm(true); // Mandar directo al formulario
                        } else {
                            setSystemStatus('Esperando inicio de sesión.');
                            setUser(null);
                            setUserProfile(null);
                        }
                    } catch (err) {
                        setSystemStatus(`Error Auth: ${err.message}`);
                        console.error(err);
                    } finally {
                        setLoading(false);
                    }
                });

                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;

                setSystemStatus('Conectando con base de datos de pases...');
                const q = query(collection(db, 'handovers'), orderBy('timestamp', 'desc'));
                const unsubHistory = onSnapshot(q, (snapshot) => {
                    try {
                        if (snapshot.empty) {
                            setSystemStatus('Base de datos vacía. Cargando datos de prueba.');
                            setHistory(MOCK_ENTRIES);
                        } else {
                            const data = snapshot.docs.map(d => ({ ...d.data(), id: d.id }));
                            setHistory(data);
                            setSystemStatus(`Sincronizados ${data.length} registros.`);
                        }
                    } catch (err) {
                        setSystemStatus(`Error en Firestore: ${err.message}`);
                        setHistory(MOCK_ENTRIES); // Fallback to mock on error
                    }
                }, (err) => {
                    setSystemStatus(`Error de conexión: ${err.message}`);
                    setHistory(MOCK_ENTRIES);
                });

                return () => unsubHistory();
            }, [user]);

            const handleLogin = async (e) => {
                e.preventDefault();
                setIsLoggingIn(true);
                setLoginError(null);
                setSystemStatus('Validando Whitelist...');
                try {
                    // 1. Validar contra colección whitelist en Firestore
                    const whitelistQuery = query(collection(db, 'whitelist'), where('email', '==', loginEmail.toLowerCase()));
                    const whitelistSnap = await getDocs(whitelistQuery);
                    
                    if (whitelistSnap.empty) {
                        const errorMsg = "Acceso Denegado: Su correo no está autorizado para Cerro Negro. Contacte al administrador";
                        setLoginError(errorMsg);
                        setSystemStatus('Acceso Denegado.');
                        
                        // Log de Intento Fallido
                        await addDoc(collection(db, 'logs'), {
                            timestamp: serverTimestamp(),
                            email: loginEmail,
                            action: 'LOGIN_DENIED',
                            reason: 'NOT_IN_WHITELIST'
                        });
                        return;
                    }

                    setSystemStatus('Autenticando...');
                    await signInWithEmailAndPassword(auth, loginEmail, loginPass).catch(async (err) => {
                        if (err.code === 'auth/user-not-found' || err.code === 'auth/invalid-credential') {
                            setSystemStatus('Registrando usuario autorizado...');
                            await createUserWithEmailAndPassword(auth, loginEmail, loginPass);
                        } else throw err;
                    });

                    setSystemStatus('Login exitoso.');
                    setForceShowForm(true); // Mandar directo al formulario
                    
                    // Log de Intento Exitoso
                    await addDoc(collection(db, 'logs'), {
                        timestamp: serverTimestamp(),
                        email: loginEmail,
                        action: 'LOGIN_SUCCESS',
                        userId: auth.currentUser?.uid
                    });

                } catch (err) {
                    let friendlyError = err.message;
                    if (err.code === 'auth/wrong-password') friendlyError = "Contraseña incorrecta.";
                    setLoginError(friendlyError);
                    setSystemStatus(`Error: ${friendlyError}`);
                    
                    // Log de Error
                    await addDoc(collection(db, 'logs'), {
                        timestamp: serverTimestamp(),
                        email: loginEmail,
                        action: 'LOGIN_ERROR',
                        error: err.message
                    });
                } finally {
                    setIsLoggingIn(false);
                }
            };

            const handleHandoverSubmit = async (entry) => {
                setSystemStatus('Enviando pase...');
                const id = crypto.randomUUID();
                const newEntry = { ...entry, id, uid: user.uid, timestamp: new Date().toISOString() };
                try {
                    await setDoc(doc(db, 'handovers', id), newEntry);
                    await addDoc(collection(db, 'logs'), { timestamp: serverTimestamp(), userId: user.uid, userEmail: user.email, action: 'CREATE_HANDOVER', details: `Nuevo pase flota ${entry.fleet}` });
                    setSystemStatus('Pase enviado correctamente.');
                    setForceShowForm(false);
                } catch (err) {
                    setSystemStatus(`Error al enviar: ${err.message}`);
                }
            };

            if (loading) return html`
                <div class="h-screen flex flex-col items-center justify-center bg-slate-900 text-white p-10">
                    <div class="w-16 h-16 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-6"></div>
                    <p class="font-black uppercase tracking-widest animate-pulse">Iniciando Handover...</p>
                    <div class="mt-10 p-4 bg-slate-800 rounded-xl border border-slate-700 text-[10px] font-mono text-blue-400 max-w-xs w-full text-center">
                        STATUS: ${systemStatus}
                    </div>
                </div>
            `;

            if (!user || !userProfile) {
                return html`
                    <div class="h-screen flex items-center justify-center bg-slate-900 p-6">
                        <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl p-10 space-y-6">
                            <div class="text-center">
                                <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-xl">
                                    <i class="fa-solid fa-mountain-sun text-white text-2xl"></i>
                                </div>
                                <h1 class="text-2xl font-black text-slate-800">Cerro Negro</h1>
                                <p class="text-[10px] text-blue-600 font-bold uppercase tracking-widest">Gestión de Turnos</p>
                            </div>
                            <form onSubmit=${handleLogin} class="space-y-4">
                                <input class="w-full bg-slate-50 border rounded-xl px-4 py-3 text-sm" placeholder="Email" value=${loginEmail} onInput=${e => setLoginEmail(e.target.value)} required />
                                <input type="password" class="w-full bg-slate-50 border rounded-xl px-4 py-3 text-sm" placeholder="Contraseña" value=${loginPass} onInput=${e => setLoginPass(e.target.value)} required />
                                ${loginError && html`<div class="text-red-500 text-[10px] font-bold uppercase border border-red-100 p-2 bg-red-50 rounded">${loginError}</div>`}
                                <button class="w-full bg-blue-600 text-white py-4 rounded-xl font-black uppercase text-xs shadow-lg hover:bg-blue-700 transition">Ingresar</button>
                            </form>
                            <div class="p-3 bg-slate-100 rounded-lg text-[8px] font-mono text-slate-500 break-all">
                                DEBUG: ${systemStatus}
                            </div>
                        </div>
                    </div>
                `;
            }

            const filteredHistory = history.filter(h => h.fleet === activeFleet);

            return html`
                <div class="flex h-screen bg-slate-900 overflow-hidden flex-col">
                    <div class="flex flex-1 overflow-hidden">
                        <aside class="w-20 bg-slate-900 border-r border-slate-800 flex flex-col items-center py-8 gap-6 shrink-0">
                            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/20 mb-4">
                                <i class="fa-solid fa-mountain-sun text-white text-lg"></i>
                            </div>
                            ${Object.values(FleetType).map(fleet => html`
                                <button 
                                    onClick=${() => { setActiveFleet(fleet); setSelectedEntry(null); setForceShowForm(false); }}
                                    class="w-12 h-12 rounded-xl flex items-center justify-center transition-all ${activeFleet === fleet ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-500 hover:bg-slate-800 hover:text-slate-300'}"
                                    title=${fleet}
                                >
                                    <i class="fa-solid ${fleet === FleetType.STRUCTURAL ? 'fa-bridge' : fleet === FleetType.ELECTRICAL ? 'fa-bolt' : fleet === FleetType.DRILLS ? 'fa-bore-hole' : fleet === FleetType.AUXILIARY ? 'fa-truck-pickup' : fleet === FleetType.SHOVELS_TRUCKS ? 'fa-truck-monster' : fleet === FleetType.GOMERIA ? 'fa-circle-dot' : 'fa-chart-line'} text-sm"></i>
                                </button>
                            `)}
                            <div class="mt-auto flex flex-col gap-4">
                                <button onClick=${() => signOut(auth)} class="w-12 h-12 rounded-xl flex items-center justify-center text-slate-500 hover:text-red-400 transition">
                                    <i class="fa-solid fa-right-from-bracket text-sm"></i>
                                </button>
                            </div>
                        </aside>

                        <main class="flex-1 flex flex-col h-full overflow-hidden bg-slate-50">
                            <header class="bg-white border-b px-10 py-6 flex justify-between items-center shrink-0 shadow-sm">
                                <div>
                                    <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Sector Operativo</h2>
                                    <p class="text-2xl font-black text-slate-800">${activeFleet}</p>
                                </div>
                                <div class="flex items-center gap-4">
                                    <button 
                                        onClick=${() => setForceShowForm(!forceShowForm)}
                                        class="bg-amber-500 text-white px-4 py-2 rounded-lg text-[9px] font-black uppercase tracking-widest shadow-sm hover:bg-amber-600 transition"
                                    >
                                        <i class="fa-solid fa-wrench mr-2"></i> Cargar Formulario Manual
                                    </button>
                                    <div class="text-right border-l pl-4 border-slate-200">
                                        <p class="text-[10px] font-black text-slate-800 uppercase">${userProfile?.displayName}</p>
                                        <p class="text-[8px] font-bold text-slate-400 uppercase">${userProfile?.role}</p>
                                    </div>
                                </div>
                            </header>

                            <div class="flex-1 overflow-y-auto p-10 custom-scrollbar">
                                <div class="max-w-5xl mx-auto">
                                    ${selectedEntry ? html`
                                        <div class="bg-white p-10 rounded-3xl shadow-xl border border-slate-200 animate-in slide-in-from-bottom-4 duration-300">
                                            <button onClick=${() => setSelectedEntry(null)} class="mb-6 text-blue-600 font-black text-[10px] uppercase tracking-widest flex items-center gap-2">
                                                <i class="fa-solid fa-arrow-left"></i> Volver
                                            </button>
                                            <h2 class="text-2xl font-black text-slate-800 uppercase">${selectedEntry.author}</h2>
                                            <p class="text-xs text-slate-400 font-bold uppercase mt-1">${selectedEntry.shiftDate} | ${selectedEntry.fleet}</p>
                                            <div class="mt-8 space-y-6">
                                                <div class="bg-slate-50 p-6 rounded-xl">
                                                    <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Observaciones</h4>
                                                    <p class="text-sm text-slate-700 leading-relaxed">${selectedEntry.generalNotes || 'Sin notas.'}</p>
                                                </div>
                                                <div class="grid grid-cols-2 gap-4">
                                                    <div class="bg-blue-50 p-4 rounded-xl">
                                                        <p class="text-[10px] font-black text-blue-600 uppercase">OTs</p>
                                                        <p class="text-lg font-black">${selectedEntry.ots?.length || 0}</p>
                                                    </div>
                                                    <div class="bg-amber-50 p-4 rounded-xl">
                                                        <p class="text-[10px] font-black text-amber-600 uppercase">Avisos</p>
                                                        <p class="text-lg font-black">${selectedEntry.notifications?.length || 0}</p>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    ` : (forceShowForm || filteredHistory.length === 0) ? html`
                                        <div class="animate-in fade-in duration-500">
                                            <${HandoverForm} fleet=${activeFleet} currentUser=${user} onSubmit=${handleHandoverSubmit} />
                                        </div>
                                    ` : html`
                                        <div class="bg-blue-50 border border-blue-100 p-6 rounded-2xl text-center mb-8">
                                            <p class="text-xs font-black text-blue-800 uppercase tracking-widest">Modo Visualización</p>
                                            <p class="text-[10px] text-blue-600 mt-1">Seleccione un registro del historial o use el botón "Cargar Formulario Manual" para crear uno nuevo.</p>
                                        </div>
                                        <${KPISection} entries=${filteredHistory} title="Métricas del Sector" />
                                    `}
                                </div>
                            </div>
                        </main>

                        <aside class="w-80 bg-white border-l border-slate-200 flex flex-col h-full shrink-0 shadow-sm overflow-hidden">
                            <div class="p-6 border-b bg-white flex justify-between items-center">
                                <h3 class="font-black text-slate-800 text-[10px] uppercase tracking-widest">Historial Técnico</h3>
                                <button onClick=${() => { setSelectedEntry(null); setForceShowForm(true); }} class="p-2 bg-slate-900 text-white rounded-lg hover:bg-slate-700 transition">
                                    <i class="fa-solid fa-plus text-[10px]"></i>
                                </button>
                            </div>
                            <div class="flex-1 overflow-y-auto p-6 space-y-4 bg-slate-50/50 custom-scrollbar">
                                ${filteredHistory.length === 0 && html`
                                    <div class="text-center py-20">
                                        <i class="fa-solid fa-folder-open text-slate-200 text-3xl mb-4"></i>
                                        <p class="text-[10px] text-slate-400 font-black uppercase tracking-widest">Sin registros</p>
                                    </div>
                                `}
                                ${filteredHistory.map(item => html`
                                    <div 
                                        key=${item.id}
                                        onClick=${() => setSelectedEntry(item)}
                                        class="bg-white border border-slate-200 rounded-xl p-4 shadow-sm hover:shadow-md transition cursor-pointer group"
                                    >
                                        <div class="flex justify-between items-center mb-2">
                                            <span class="text-[9px] font-bold text-slate-400 uppercase">${item.shiftDate}</span>
                                            <i class="fa-solid fa-chevron-right text-[10px] text-slate-300 group-hover:text-blue-500"></i>
                                        </div>
                                        <p class="text-xs font-black text-slate-800 uppercase truncate">${item.author}</p>
                                        <div class="mt-3 flex gap-3">
                                            <span class="text-[9px] font-bold text-slate-500 uppercase tracking-tighter"><i class="fa-solid fa-wrench text-blue-500 mr-1"></i> ${item.ots?.length || 0} OTs</span>
                                            <span class="text-[9px] font-bold text-slate-500 uppercase tracking-tighter"><i class="fa-solid fa-bell text-amber-500 mr-1"></i> ${item.notifications?.length || 0} Avisos</span>
                                        </div>
                                    </div>
                                `)}
                            </div>
                        </aside>
                    </div>
                    
                    {/* System Status Console */}
                    <footer class="bg-slate-950 border-t border-slate-800 px-6 py-2 flex justify-between items-center shrink-0">
                        <div class="flex items-center gap-3">
                            <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                            <span class="text-[9px] font-black text-slate-500 uppercase tracking-widest">Estado del Sistema:</span>
                            <span class="text-[9px] font-mono text-emerald-400">${systemStatus}</span>
                        </div>
                        <div class="text-[8px] font-bold text-slate-600 uppercase">
                            Cerro Negro Handover v2.1 | Conectado a Firestore
                        </div>
                    </footer>
                </div>
            `;
        };

        render(html`<${App} />`, document.getElementById('root'));
    </script>
</body>
</html>
